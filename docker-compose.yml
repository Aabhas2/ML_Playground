services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ml_playground}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      ENV: ${ENV:-development}
      API_PORT: ${API_PORT:-8000}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      RQ_QUEUE: ${RQ_QUEUE:-default}
      CORS_ORIGINS: ${CORS_ORIGINS}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./apps/api:/app

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      ENV: ${ENV:-development}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      RQ_QUEUE: ${RQ_QUEUE:-default}
    depends_on:
      - redis
      - postgres
    volumes:
      - ./apps/api:/app
    command: ["python", "-m", "app.workers.rq_worker"]

volumes:
  pgdata: